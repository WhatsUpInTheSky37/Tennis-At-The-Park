version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: tennisuser
      POSTGRES_PASSWORD: tennispass
      POSTGRES_DB: ultimatetennis
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennisuser -d ultimatetennis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tennisuser:tennispass@db:5432/ultimatetennis
      JWT_SECRET: change-this-to-a-secure-secret-at-least-32-chars
      PORT: "3001"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # Nginx reverse proxy to serve frontend and proxy /api to backend
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
